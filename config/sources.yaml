# Blog Sources Configuration for Context Crew
# 
# Sources are divided into two categories:
# 1. RSS Sources - Preferred, more reliable
# 2. HTML Sources - Fallback when no RSS available

# =============================================================================
# RSS Sources (Preferred - These rarely break)
# =============================================================================

rss_sources:
  langchain:
    name: "LangChain Blog"
    rss_url: "https://blog.langchain.dev/rss/"
    base_url: "https://blog.langchain.dev"
    enabled: true
    priority: 1
    default_tags:
      - langchain
      - agents
      - chains
      - rag
      - langgraph
      - langsmith

  huggingface:
    name: "Hugging Face Blog"
    rss_url: "https://huggingface.co/blog/feed.xml"
    base_url: "https://huggingface.co"
