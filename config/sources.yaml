# =============================================================================
# Global Settings
# =============================================================================

global:
  user_agent: "ContextCrewBot/1.0 (Academic Research; UW Capstone Project)"
  default_rate_limit_seconds: 2
  max_retries: 3
  retry_delay_seconds: 5
  request_timeout_seconds: 30
  max_articles_per_source: 50

# =============================================================================
# Content Filtering
# =============================================================================

filtering:
  min_word_count: 200
  max_word_count: 50000
  
  # Articles must contain at least one of these keywords
  relevant_keywords:
    - rag
    - retrieval augmented generation
    - retrieval
    - llm
    - language models
    - agent
    - context engineering
    - context windows
    - embedding
    - vector search
    - semantic search
    - generation
    - prompt engineering
    - prompt
    - fine-tuning
    - transformer
    - attention mechanisms
    - chain of thought
    - reasoning
    - re-ranking
    - inference
    - knowledge graphs
    - instruction following
    - co-reference resolution
    - langchain
    - llamaindex
  
  # Skip URLs containing these patterns
  exclude_patterns:
    - /careers
    - /jobs
    - /pricing
    - /terms
    - /privacy
    - /login
    - /signup
